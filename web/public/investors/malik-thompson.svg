<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c44e2c"/>
      <stop offset="100%" stop-color="#e8945a"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <!-- Body - stylish jacket -->
    <ellipse cx="100" cy="225" rx="78" ry="52" fill="#1a1a2e"/>
    <!-- Turtleneck -->
    <rect x="82" y="168" width="36" height="22" rx="10" fill="#333"/>
    <!-- Neck -->
    <rect x="88" y="148" width="24" height="28" rx="5" fill="#8B5E3C"/>
    <!-- Head -->
    <ellipse cx="100" cy="110" rx="42" ry="50" fill="#8B5E3C"/>
    <!-- Hair - short cropped fade -->
    <path d="M58 105 Q58 58 100 50 Q142 58 142 105 L140 98 Q140 60 100 53 Q60 60 60 98 Z" fill="#1a1a1a"/>
    <!-- Fade effect -->
    <path d="M58 108 Q57 100 60 95" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.5"/>
    <path d="M142 108 Q143 100 140 95" fill="none" stroke="#1a1a1a" stroke-width="3" opacity="0.5"/>
    <!-- Eyebrows - confident, strong -->
    <path d="M70 95 Q80 90 90 94" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M110 94 Q120 90 130 95" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eyes - sharp, energetic -->
    <ellipse cx="80" cy="105" rx="6" ry="4.5" fill="white"/>
    <ellipse cx="120" cy="105" rx="6" ry="4.5" fill="white"/>
    <circle cx="81" cy="105" r="3.5" fill="#3a2510"/>
    <circle cx="121" cy="105" r="3.5" fill="#3a2510"/>
    <circle cx="82" cy="104" r="1.2" fill="white"/>
    <circle cx="122" cy="104" r="1.2" fill="white"/>
    <!-- Nose -->
    <path d="M100 108 L96 122 Q100 126 104 122 Z" fill="#7a5030" opacity="0.4"/>
    <!-- Goatee/beard -->
    <path d="M90 140 Q100 152 110 140 Q108 148 100 152 Q92 148 90 140 Z" fill="#1a1a1a" opacity="0.7"/>
    <rect x="95" y="126" width="10" height="14" rx="3" fill="#1a1a1a" opacity="0.3"/>
    <!-- Mouth - charismatic grin -->
    <path d="M86 134 Q100 142 114 134" fill="none" stroke="#6a3a2a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Teeth flash -->
    <path d="M92 136 Q100 140 108 136" fill="white" opacity="0.5"/>
    <!-- Ears -->
    <ellipse cx="58" cy="110" rx="6" ry="10" fill="#7a5030"/>
    <ellipse cx="142" cy="110" rx="6" ry="10" fill="#7a5030"/>
    <!-- Earring stud -->
    <circle cx="56" cy="112" r="2" fill="#FFD700"/>
    <!-- Chain necklace hint -->
    <path d="M88 175 Q100 182 112 175" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>