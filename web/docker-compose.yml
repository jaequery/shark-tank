services:
  postgres:
    image: postgres:17-alpine
    container_name: sharktank-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sharktank
      POSTGRES_PASSWORD: sharktank
      POSTGRES_DB: sharktank
    ports:
      - "5656:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
